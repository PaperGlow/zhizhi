<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于</title>
    <style>
        :root {
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --gray-95: #F2F2F2;
            --gray-85: #D9D9D9;
            --gray-65: #A6A6A6;
            --font-mono: "Courier New", Courier, "Liberation Mono", "Consolas", "Noto Sans Mono", monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-mono);
            background-color: var(--gray-95);
            color: var(--pure-black);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 42px;
            background-color: var(--pure-white);
            display: flex; align-items: center; padding: 0 20px; z-index: 100;
            border-bottom: 2px solid var(--pure-black);
        }
        #top-bar .title { font-size: 26px; font-weight: bold; color: var(--pure-black); }
        #content {
            max-width: 700px;
            margin: 64px auto 40px;
            padding: 24px;
            background-color: var(--pure-white);
            border: 2px solid var(--pure-black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }
        .blog-header h1 {
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--pure-black);
            padding-bottom: 8px;
            font-weight: bold;
        }
        .blog-body {
            font-size: 15px;
            line-height: 1.7;
        }
        .blog-body hr {
            border: none;
            border-top: 2px solid var(--pure-black);
            margin: 24px 0;
        }
        .blog-body blockquote {
            border-left: 4px solid var(--pure-black);
            margin: 12px 0;
            padding: 10px 16px;
            background: var(--gray-95);
        }
        .blog-body pre {
            background: var(--gray-95);
            border: 1px solid var(--gray-65);
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 12px 0;
        }
        .blog-body ul, .blog-body ol {
            padding-left: 1.8rem;
            margin: 8px 0;
        }
        .blog-body a {
            color: var(--pure-black);
            text-decoration: underline;
        }
        .blog-body p {
            margin: 0.8em 0;
        }
        @media (max-width: 560px) {
            #content { margin: 60px 16px 30px; padding: 18px; }
            #top-bar .title { font-size: 22px; }
            .blog-header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div id="top-bar">
    <span class="title">蜘蜘</span>
</div>
<div id="content">
    <div class="blog-header">

    </div>
